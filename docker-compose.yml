version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ngafa_db
      - POSTGRES_USER=ngafa_user
      - POSTGRES_PASSWORD=ngafa_password
    ports:
      - "5432:5432"

  backend:
    build: 
      context: ./backend
    command: >
      sh -c "while ! nc -z db 5432; do sleep 1; done;
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    environment:
      - SECRET_KEY=prod-secret-key-change-me
      - DEBUG=True 
      - DB_ENGINE=django.db.backends.postgresql
      - POSTGRES_DB=ngafa_db
      - POSTGRES_USER=ngafa_user
      - POSTGRES_PASSWORD=ngafa_password
      - DB_HOST=db
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
